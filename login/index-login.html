<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIDA - AI Detector Analysis</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
</head>

<body>
  <a href="../index.html"><img src="Vector 5.svg" alt="" class="volta"></a>
  <div class="card">
    <div class="card-bg card-bg-1 signin"></div>
    <div class="card-bg card-bg-2"></div>
    <img class="logo logo-1" src="Group 1.png" alt="">
    <img class="logo logo-2" src="Group 1.png" alt="">
    <div class="form signin">

    <form id="loginForm">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit">SIGN IN</button>
        <a onclick="toggleView()">Ainda não tem uma conta? <em>Sign up</em></a>
      </form>
    </div>
    <div class="form signup active">

  <form id="registerForm">
      <h2>Registro</h2>
      <input type="text" id="regName" placeholder="Name" required />
      <input type="email" id="regEmail" placeholder="Email" required />
      <input type="password" id="regPassword" placeholder="Password" required />
      <button type="submit">SIGN UP</button>
      <a onclick="toggleView()">Já possui uma conta? <em>Sign in</em></a>
    </form>

    </div>

    <div id="mensagem-feedback" style="text-align: center; margin-bottom: 10px; font-size: 14px; min-height: 20px;"></div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>

</html>
