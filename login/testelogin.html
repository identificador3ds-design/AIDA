<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDA - AI Detector Analysis</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
</head>
<body>
    <div class="card">
        <div class="card-bg card-bg-1 signin"></div>
        <div class="card-bg card-bg-2"></div>
        <img class="logo logo-1" src="Group 1.png" alt="">
        <img class="logo logo-2" src="Group 1.png" alt="">
        <div class="form signin">
        <form>
          <h2>Login</h2>
          <input type="text" placeholder="Email" />
          <input type="password" placeholder="Password" />
          <p>Esqueceu a senha?</p>
          <button>SIGN IN</button>
          <a onclick="toggleView()">Ainda não tem uma conta? <em>Sign up</em></a>
        </form>
      </div>
      <div class="form signup active">
        <form>
          <h2>Registro</h2>
          <input type="text" placeholder="Name" />
          <input type="email" placeholder="Email" />
          <input type="password" placeholder="Password" />
          <button>SIGN UP</button>
          <a onclick="toggleView()">Já possui uma conta? <em>Sign in</em></a>
        </form>
      </div>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
