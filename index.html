<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script src="https://unpkg.com/akar-icons-fonts"></script>
    <title>AIDA</title>
</head>

<body>
    <main>
        <button class="signin"><a href="login/index-login.html">Sign IN/Sign UP</a></button>
        <div class="content">
            <a href="seleciona.html"><img style="max-width: 500px;" src="img/Logo.png" alt=""></a>
            <h1 class="text">Você sabe a verdade por trás do que vê?
            </h1>
        </div>
        <div class="rolarpg">
            <img src="img/Frame 9.png" alt="" class="imgrpg">
            <span class="seta"><img src="img/Arrow 2.png" alt=""></span>

        </div>

    </main>
    <h1 class="title-tech">Nossas Tecnologias</h1>
    <section class="icons-section">
        <div class="flex flex-wrap gap-10 justify-center">

            <!-- CARD 1 - TECNOLOGIAS -->
            <div class="card relative bg-white w-[340px] rounded-3xl shadow-xl p-8">
                <!-- Botão roxo -->
                <div
                    class="absolute -top-5 -right-5 bg-violet-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-arrow-right text-white text-2xl"></i>
                </div>

                <!-- Ícone Tecnologias -->
                <div class="flex justify-center mb-8">
                    <svg width="88" height="78" viewBox="0 0 88 78" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Notebook -->
                        <rect x="8" y="12" width="72" height="48" rx="8" stroke="#64748b" stroke-width="7" />
                        <!-- Tela -->
                        <rect x="15" y="20" width="58" height="34" rx="3" fill="#f8fafc" />
                        <!-- Código dentro da tela -->
                        <text x="24" y="42" font-family="monospace" font-size="19" fill="#475569"
                            font-weight="700">&lt;/&gt;</text>
                        <!-- Base do notebook -->
                        <rect x="12" y="57" width="64" height="8" rx="4" fill="#64748b" />
                        <!-- Gear -->
                        <g transform="translate(68 52)">
                            <circle cx="0" cy="0" r="11.5" fill="#64748b" />
                            <circle cx="0" cy="0" r="6.5" fill="#f8fafc" />
                            <circle cx="0" cy="0" r="2" fill="#64748b" />
                        </g>
                    </svg>
                </div>

                <h2 class="text-3xl font-bold text-center text-gray-800 mb-3">Tecnologias</h2>
                <p class="text-gray-600 text-[15.2px] leading-relaxed text-center">
                    Vamos usar:<br>
                    HTML, CSS, JS, GitHub, PHP, MySQL,<br>
                    React, Python e GSAP
                </p>
            </div>

            <!-- CARD 2 - MÉTODOS -->
            <div class="card relative bg-white w-[340px] rounded-3xl shadow-xl p-8">
                <!-- Botão roxo -->
                <div
                    class="absolute -top-5 -right-5 bg-violet-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-arrow-right text-white text-2xl"></i>
                </div>

                <!-- Ícone Métodos -->
                <div class="flex flex-col items-center mb-8">
                    <!-- Onda FFT -->
                    <svg width="92" height="38" viewBox="0 0 200 70" fill="none" xmlns="http://www.w3.org/2000/svg"
                        class="mb-4">
                        <path d="M10 35 Q35 10 55 35 Q75 60 95 35 Q115 10 135 35 Q155 60 175 35" stroke="#64748b"
                            stroke-width="9" stroke-linecap="round" fill="none" />
                    </svg>

                    <!-- Texturas Pele × Tecido -->
                    <div class="flex items-center gap-4">
                        <!-- Pele (textura suave) -->
                        <div class="w-11 h-11 rounded-xl border-2 border-slate-400 overflow-hidden">
                            <div class="w-full h-full bg-gradient-to-br from-amber-100 to-orange-100"
                                style="background-image: linear-gradient(135deg, #fcd34d 25%, transparent 25%), linear-gradient(225deg, #fcd34d 25%, transparent 25%); background-size: 7px 7px;">
                            </div>
                        </div>

                        <span class="text-4xl text-slate-400 font-light leading-none">×</span>

                        <!-- Tecido (textura trama) -->
                        <div class="w-11 h-11 rounded-xl border-2 border-slate-400 overflow-hidden">
                            <div class="w-full h-full bg-slate-200" style="background-image: 
                        repeating-linear-gradient(0deg, #64748b, #64748b 1.5px, transparent 1.5px, transparent 7px),
                        repeating-linear-gradient(90deg, #64748b, #64748b 1.5px, transparent 1.5px, transparent 7px);">
                            </div>
                        </div>
                    </div>
                </div>

                <h2 class="text-3xl font-bold text-center text-gray-800 mb-3">Métodos</h2>
                <p class="text-gray-600 text-[15.2px] leading-relaxed text-center">
                    FFT, PSEM, Pele x Tecido
                </p>
            </div>

        </div>

        <div class="icons-grid">
            <div class="icon-wrapper"><img src="./img/html5-brands-solid-full.svg" alt="HTML" class="imgico"></div>
            <div class="icon-wrapper"><img src="./img/css-brands-solid-full.svg" alt="CSS" class="imgico"></div>
            <div class="icon-wrapper"><img src="./img/js-brands-solid-full.svg" alt="JS" class="imgico"></div>
            <div class="icon-wrapper"><img src="./img/gsap.svg" alt="GSAP" class="imgico"></div>
            <div class="icon-wrapper"><img src="./img/react-brands-solid-full.svg" alt="REACT" class="imgico"></div>
            <div class="icon-wrapper"><img src="./img/php-brands-solid-full.svg" alt="FIGMA" class="imgico"></div>
            <div class="icon-wrapper"><img src="./img/mysql-svgrepo-com.svg" alt="FIREBASE" class="imgico"></div>
            <div class="icon-wrapper"><img src="./img/python-brands-solid-full.svg" alt="PYTHON" class="imgico"></div>
            <div class="icon-wrapper"><img src="./img/square-github-brands-solid-full.svg" alt="GITHUB" class="imgico">
            </div>
        </div>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/SplitText.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
